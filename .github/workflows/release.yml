name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

          - target: x86_64-pc-windows-msvc
            os: windows-latest

          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libwayland-dev

      - name: Build CLI
        run: cargo build --release --bin defaulthound
        env:
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"

      - name: Build GUI
        run: cargo build --release --bin defaulthound-gui
        env:
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist

          VERSION="${GITHUB_REF_NAME}"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then

            cp target/release/defaulthound.exe \
              "dist/defaulthound-${{ matrix.target }}-${VERSION}.exe"

            cp target/release/defaulthound-gui.exe \
              "dist/defaulthound-gui-${{ matrix.target }}-${VERSION}.exe"

          else

            cp target/release/defaulthound dist/defaulthound

            tar -czf \
              "dist/defaulthound-${{ matrix.target }}-${VERSION}.tar.gz" \
              -C dist defaulthound

            rm dist/defaulthound

            cp target/release/defaulthound-gui dist/defaulthound-gui

            tar -czf \
              "dist/defaulthound-gui-${{ matrix.target }}-${VERSION}.tar.gz" \
              -C dist defaulthound-gui

            rm dist/defaulthound-gui

          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
