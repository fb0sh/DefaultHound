# =============================================================
# DefaultHound — Test Environment
# =============================================================
#
# 架构：所有后端服务运行在自定义 Docker 网络内，每个服务拥有
#       独立的静态 IP。一个"Gateway"容器用 socat 把各服务端口
#       统一暴露在 172.20.0.2 这一个 IP 上。
#
# 扫描时，defaulthound 只需指向 172.20.0.2，即可检测全部服务。
#
# 用法：
#   docker compose -f tests/docker-compose.yml up -d
#   bash tests/scan.sh           # 从 Docker 内部扫描
#   # 或从宿主机: 直接扫描 localhost:PORT
#   cargo run --release          # 默认 127.0.0.1
# =============================================================

networks:
  defaulthound-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

# ═══════════════════════════════════════════════════════════
# Gateway — 把所有服务的端口聚合到 172.20.0.2
# ═══════════════════════════════════════════════════════════
x-gateway-base: &gateway-base
  image: alpine:latest
  networks:
    defaulthound-net:
      ipv4_address: 172.20.0.2
  depends_on:
    redis: { condition: service_started }
    memcached: { condition: service_started }
    mongodb: { condition: service_started }
    couchdb: { condition: service_started }
    elasticsearch: { condition: service_started }
    ftp: { condition: service_started }
  ports: &gateway-ports
    # 发布到宿主机，方便调试时用 curl / nc / redis-cli
    - "6379:6379"
    - "11211:11211"
    - "27017:27017"
    - "5984:5984"
    - "9200:9200"
    - "21:21"
  # 用 socat 把每个端口转发到后端容器
  command: >
    sh -c "
      apk add --no-cache socat >/dev/null 2>&1 &&
      echo '╔══════════════════════════════════════════╗'
      echo '║  Gateway starting port forwards...       ║'
      echo '╚══════════════════════════════════════════╝'
      socat TCP-LISTEN:6379,fork,reuseaddr TCP:redis:6379 &
      echo '  ✓ :6379 → redis:6379'
      socat TCP-LISTEN:11211,fork,reuseaddr TCP:memcached:11211 &
      echo '  ✓ :11211 → memcached:11211'
      socat TCP-LISTEN:27017,fork,reuseaddr TCP:mongodb:27017 &
      echo '  ✓ :27017 → mongodb:27017'
      socat TCP-LISTEN:5984,fork,reuseaddr TCP:couchdb:5984 &
      echo '  ✓ :5984 → couchdb:5984'
      socat TCP-LISTEN:9200,fork,reuseaddr TCP:elasticsearch:9200 &
      echo '  ✓ :9200 → elasticsearch:9200'
      socat TCP-LISTEN:21,fork,reuseaddr TCP:ftp:21 &
      echo '  ✓ :21 → ftp:21'
      echo ''
      echo 'Gateway ready → 172.20.0.2'
      echo 'From container: defaulthound 172.20.0.2'
      echo 'From host:      defaulthound localhost'
      wait
    "

services:
  gateway:
    <<: *gateway-base

  # ── Redis ──────────────────────────────────────────────
  # TCP 6379 · 无认证 · 响应 PING → PONG
  redis:
    image: redis:alpine
    container_name: dh-redis
    networks:
      defaulthound-net:
        ipv4_address: 172.20.0.10
    restart: unless-stopped

  # ── Memcached ──────────────────────────────────────────
  # TCP 11211 · 无认证 · 响应 stats 命令
  memcached:
    image: memcached:alpine
    container_name: dh-memcached
    networks:
      defaulthound-net:
        ipv4_address: 172.20.0.11
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────
  # TCP 27017 · 无认证 · 可执行 db.adminCommand('ping')
  mongodb:
    image: mongo:7
    container_name: dh-mongo
    networks:
      defaulthound-net:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

  # ── CouchDB 2.x ────────────────────────────────────────
  # TCP 5984 · Admin Party 模式（无需认证）
  couchdb:
    image: couchdb:2.3.1
    container_name: dh-couchdb
    networks:
      defaulthound-net:
        ipv4_address: 172.20.0.13
    restart: unless-stopped

  # ── Elasticsearch 7.17 ─────────────────────────────────
  # HTTP 9200 · 未启用安全认证
  elasticsearch:
    image: elasticsearch:7.17.25
    container_name: dh-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      defaulthound-net:
        ipv4_address: 172.20.0.14
    restart: unless-stopped

  # ── FTP (vsftpd) ───────────────────────────────────────
  # TCP 21 · 允许匿名登录（anonymous:anonymous@example.com）
  ftp:
    image: fauria/vsftpd
    container_name: dh-ftp
    environment:
      - FTP_USER=anon
      - FTP_PASS=anon
      - ANONYMOUS_ENABLED=true
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21100
    networks:
      defaulthound-net:
        ipv4_address: 172.20.0.15
    ports:
      - "21100:21100"
    restart: unless-stopped
