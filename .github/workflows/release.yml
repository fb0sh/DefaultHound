name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            os: ubuntu-latest
            arch: x86_64
          - target: x86_64-windows
            os: windows-latest
            arch: x86_64
          - target: aarch64-macos
            os: macos-latest
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libgtk-3-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libwayland-dev

      - name: Build CLI (defaulthound)
        run: cargo build --release --bin defaulthound
        env:
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"

      - name: Build GUI (defaulthound-gui)
        run: cargo build --release --bin defaulthound-gui
        env:
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"

      - name: Package CLI
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/defaulthound.exe dist/
            cd dist && zip -r ../defaulthound-${{ matrix.target }}.zip defaulthound.exe
          else
            cp target/release/defaulthound dist/
            tar czf defaulthound-${{ matrix.target }}.tar.gz -C dist defaulthound
          fi

      - name: Package GUI
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/defaulthound-gui.exe dist/
            cd dist && zip -r ../defaulthound-gui-${{ matrix.target }}.zip defaulthound-gui.exe
          else
            cp target/release/defaulthound-gui dist/
            tar czf defaulthound-gui-${{ matrix.target }}.tar.gz -C dist defaulthound-gui
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: defaulthound-${{ matrix.target }}
          path: |
            defaulthound-${{ matrix.target }}.tar.gz
            defaulthound-gui-${{ matrix.target }}.tar.gz
            defaulthound-${{ matrix.target }}.zip
            defaulthound-gui-${{ matrix.target }}.zip

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
